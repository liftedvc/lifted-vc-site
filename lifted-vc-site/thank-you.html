<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — Lifted.vc</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#F8F7F2; --ink:#0B0B09; --accent:#1A47FF; --muted:#6B6B60; --white:#FFFFFF; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:32px;}
    .check{width:72px;height:72px;border-radius:50%;background:var(--accent);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;margin:0 auto 24px;}
    h1{font-weight:800;font-size:44px;letter-spacing:-.03em;margin-bottom:14px;}
    p{font-size:17px;color:var(--muted);line-height:1.65;margin-bottom:28px;max-width:520px;}
    a{background:var(--ink);color:var(--white);padding:14px 28px;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;display:inline-block;transition:background .15s;}
    a:hover{background:var(--accent);}
  </style>
</head>
<body>
  <div>
    <div class="check">✓</div>
    <h1>Message received.</h1>
    <p>Thanks for reaching out. I'll read your note personally and get back to you within 1&ndash;2 business days. In the meantime, feel free to check out the free playbook.</p>
    <a href="/">Back to Lifted.vc →</a>
  </div>
</body>
</html>
