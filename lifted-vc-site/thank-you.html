<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — Lifted.vc</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#F2F0FA; --ink:#0A0A0F; --accent:#2D1B6E; --accent-deep:#1F1250; --muted:#5A5566; --white:#FFFFFF; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:32px;}
    .check{width:72px;height:72px;border-radius:50%;background:var(--accent);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;margin:0 auto 24px;box-shadow:0 12px 32px rgba(45,27,110,.25);}
    h1{font-family:Georgia,serif;font-weight:700;font-size:46px;letter-spacing:-.015em;margin-bottom:14px;}
    p{font-size:17px;color:var(--muted);line-height:1.65;margin-bottom:28px;max-width:520px;}
    a{background:var(--accent);color:var(--white);padding:14px 28px;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;display:inline-block;transition:background .2s,transform .2s,box-shadow .2s;}
    a:hover{background:var(--accent-deep);transform:translateY(-2px);box-shadow:0 10px 24px rgba(45,27,110,.25);}
  </style>
</head>
<body>
  <div>
    <div class="check">✓</div>
    <h1>Message received.</h1>
    <p>Thanks for reaching out. I'll read your note personally and get back to you within 1&ndash;2 business days. In the meantime, feel free to check out the free playbook.</p>
    <a href="/">Back to Lifted.vc →</a>
  </div>
</body>
</html>
