// Pulls a ~120-char window around the first occurrence of `query` in
// `text`, with leading/trailing ellipses when truncated. Used to render
// a body-content preview line in search results.
function extractSnippet(text, query) {
  if (!text || !query) return '';
  const i = text.indexOf(query);
  if (i < 0) return '';
  const start = Math.max(0, i - 40);
  const end = Math.min(text.length, i + query.length + 80);
  let snippet = text.slice(start, end);
  if (start > 0) snippet = '…' + snippet;
  if (end < text.length) snippet = snippet + '…';
  return snippet.replace(/\s+/g, ' ').trim();
}

    label: "Ch6.05"

    label: "Ch12.03"

    chapter: "activate",
    subIdx: 2,
    label: "Ch8.03"

  ref: {
    chapter: "arc",
    subIdx: 1,
    label: "Ch3.02"
  }
}, {
  term: "Wire",
  def: "The actual movement of capital into your bank account, 3–10 business days after term sheet signing. Plan runway off the wire date, not the signing date.",
  ref: {
    chapter: "close",
    subIdx: 1,
    label: "Ch13.02"
  }

  term: "Quality mix",
  def: "The list composition inside the launch bar: 70% at 1B or better (Tier 1 investors reached through Tier A or B connectors), with at least half of that 70% being potential lead investors. Concrete shorthand for what 'good' looks like across the 80–120 list.",
  ref: {
    chapter: "activate",
    subIdx: 1,
    label: "Ch8.02"
  }
}];

}, {

// Shared copy-to-clipboard helper. Returns a stateful handler that flips
// the button label to "Copied!" briefly. Falls back to a hidden textarea
// + execCommand("copy") for older clipboards.
function usePBClipboard() {

      navigator.clipboard.writeText(text).then(flash, () => flash());

      const ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
      } catch (e) {/* ignore */}
      document.body.removeChild(ta);
      flash();
    }
  }, []);
  return [copyState, copy];
}
